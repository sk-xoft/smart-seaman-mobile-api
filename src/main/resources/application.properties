# ============================================================
# Application Profile
# ============================================================
spring.profiles.active=pro

# ============================================================
# Spring Framework
# ============================================================
spring.main.allow-circular-references=true
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.thymeleaf.check-template-location=false

# ============================================================
# Swagger / API Docs
# ============================================================
springdoc.api-docs.path=/smart-seaman-swagger

# ============================================================
# DataSource
# ============================================================
smart.seaman.datasource.driver=com.mysql.cj.jdbc.Driver
smart.seaman.datasource.url=jdbc:mysql://dev-smartseaman-db-01-do-user-7722588-0.b.db.ondigitalocean.com:25060/seaman?autoReconnect=true&useSSL=false
smart.seaman.datasource.username=seamandb
smart.seaman.datasource.password=${DB_PASSWORD}

# Local datasource (uncomment to use)
#smart.seaman.datasource.url=jdbc:mysql://localhost:3306/smartseaman?autoreconnect=true
#smart.seaman.datasource.username=root
#smart.seaman.datasource.password=P@ssw0rd

# ============================================================
# HikariCP Connection Pool
# ============================================================
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# Object Storage (DigitalOcean Spaces / S3-compatible)
# ============================================================
object.store.endpoint=https://dev-smartseaman-obs-01.sgp1.digitaloceanspaces.com
object.store.key=${DO_SPACES_KEY}
object.store.secret=${DO_SPACES_SECRET}
object.store.region=Singapore
object.store.bucket=smart-seaman-bucket

object.store.path.root=documents
object.store.path.template=${object.store.path.root}/%s/certs/%s
object.store.path.documents.download=document_download
object.store.path.profiles.images=profiles/images
object.store.path.profile.picture=profile_picture
object.store.path.news=news
object.store.path.banner=banner
object.store.path.voucher=voucher
object.store.path.voucher.qr=voucher/qr

# ============================================================
# Security — Encrypt / JWT
# ============================================================
encrypt.cert.key=${ENCRYPT_KEY}
jwt.secret=${JWT_SECRET}

# ============================================================
# Email (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=info.smartseaman
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Previous email account (uncomment to use)
#spring.mail.username=sup.smartseaman
#spring.mail.password=CHANGE_ME_MAIL_PASSWORD_OLD

# ============================================================
# Firebase Cloud Messaging (FCM)
# ============================================================
fcm.firebase.credential.file=${FCM_CREDENTIAL_FILE}

# ============================================================
# Scheduler
# ============================================================
# cache.scheduled.notification=0 0/1 * ? * *   (every minute — for testing)
cache.scheduled.notification=@daily

# ============================================================
# Callback URLs
# ============================================================
register.confirm.url=https://mobile.smartseaman.com/confirm-register
forgot.confirm.url=https://mobile.smartseaman.com/forgot-password

# ============================================================
# Batch / Background Jobs
# ============================================================
batch.delete.user.mobile=service.smartseaman@gmail.com
